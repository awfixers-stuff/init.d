#
# Native file: pass to Meson to trim systemd for a Wayland-only / minimal porting target.
#
#   meson setup build --native-file contrib/wayland-minimal.ini
#
# Adjust or override any option for your distro. Options follow meson_options.txt names.

[project options]
# Core stack (keep journald, logind, udev, tmpfiles, sysusers, binfmt, coredump as needed)
networkd = false
resolve = false
timesyncd = false

# NSS: keep nss-systemd only (default); disable optional modules
nss-myhostname = false
nss-mymachines = disabled
nss-resolve = disabled

# User / home / container stacks
homed = disabled
portabled = false
importd = disabled
machined = false
userdb = false

# Extra session / host daemons
hostnamed = false
localed = false
timedated = false
nsresourced = false
mountfsd = false

# Security / LSM / TPM
polkit = disabled
selinux = disabled
apparmor = disabled
smack = false
ima = false
ipe = false
tpm = false
tpm2 = disabled

# Boot / legacy
efi = false
utmp = false
compat-sysv-interfaces = false

# Wayland-only logind/PAM (no X11 session type or .X11-unix handling)
x11-session = false

# Docs, tests, shell completion, translations
man = disabled
html = disabled
tests = false
translations = false
bashcompletiondir = no
zshcompletiondir = no

# Other optional components (tighten further as needed)
sysext = false
oomd = false
pstore = false
imds = disabled
sysupdated = disabled
ukify = disabled
repart = disabled
sysupdate = disabled
vmspawn = disabled
nspawn = disabled
xdg-autostart = false
kernel-install = false
analyze = false
